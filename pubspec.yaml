name: car_game
description: Arcade car racing game built with Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  image: ^4.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/road_tile.png
    - assets/images/car_player.png
    - assets/images/car_enemy.png
    - assets/images/car_1.png
    - assets/images/car_2.png
    - assets/images/car_3.png
    - assets/images/car_4.png
    - assets/images/car_5.png
    - assets/images/car_6.png
    - assets/images/car_7.png
    - assets/images/car_8.png
    - assets/images/car_9.png
    - assets/images/car_10.png
